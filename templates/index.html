<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Webhook Tester</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-2xl mx-auto py-8">
        <h1 class="text-2xl font-bold mb-4">Webhook Listener Landing Page</h1>
        <form method="POST" action="/create-listener" class="mb-6">
            <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition">Create New Webhook Listener</button>
        </form>
        {{if .Listeners}}
            <h2 class="text-lg font-semibold mb-2">Active Listeners</h2>
            <ul class="space-y-3">
            {{range .Listeners}}
                <li class="border rounded-lg bg-white shadow p-4 flex flex-col md:flex-row md:items-center md:justify-between">
                    <div>
                        <a href="/listener/{{.}}" class="text-blue-700 underline font-mono">/listener/{{.}}</a>
                        <div class="text-xs text-gray-500 mt-1">POST endpoint: <span class="font-mono">/listener/{{.}}</span></div>
                    </div>
                    <a href="/listener/{{.}}" class="mt-2 md:mt-0 inline-block px-3 py-1 bg-blue-100 text-blue-800 rounded text-xs font-semibold hover:bg-blue-200 transition">View</a>
                </li>
            {{end}}
            </ul>
        {{else}}
            <p class="text-gray-500">No listeners created yet.</p>
        {{end}}
    </div>
</body>
</html>
